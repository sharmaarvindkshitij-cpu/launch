<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup & Entrepreneurship Club – Official Launch</title>
    <!-- Modern fonts: Orbitron and Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particle canvas -->
    <canvas id="particleCanvas"></canvas>

    <!-- Main UI Container -->
    <div class="ui-container" id="uiContainer">
        <h1 class="main-title">Startup & Entrepreneurship Club<br><span class="highlight">Official Launch</span></h1>
        
        <!-- Tagline -->
        <p class="tagline">Innovate | Build | Lead</p>
        
        <button id="launchBtn" class="launch-btn" aria-label="Launch">
            <span class="btn-text">LAUNCH</span>
            <span class="btn-glow"></span>
        </button>
    </div>

    <!-- Sequence Text Container -->
    <div class="sequence-container" id="sequenceContainer">
        <div id="sequenceText" class="sequence-text"></div>
        <!-- Progress Bar -->
        <div id="progressBarContainer" class="progress-bar-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
    </div>

    <!-- Final flash effect -->
    <div class="flash-overlay" id="flashOverlay"></div>

    <script src="script.js"></script>
</body>
</html>
